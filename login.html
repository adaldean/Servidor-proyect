<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🌍 Mapa Mundial Educativo - Autenticación</title>
    <link rel="stylesheet" href="/static/style_login.css">
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🌍 Mapa Mundial</h1>
            <p>Para estudiantes de primaria a preparatoria</p>
        </div>

        <div class="tabs">
            <button class="tab-btn active" onclick="switchTab('registro')">📝 Registrarse</button>
            <button class="tab-btn" onclick="switchTab('login')">🔓 Entrar</button>
        </div>

        <!-- FORMULARIO DE REGISTRO -->
        <form id="registerForm" onsubmit="handleRegister(event)">
            <div class="form-group active">
                <label for="regNombre">¿Cuál es tu nombre?</label>
                <input type="text" id="regNombre" placeholder="Ej: Juan, María, Carlos..." required>
            </div>

            <div class="form-group active">
                <label for="regPin">Elige tu PIN (4 números)</label>
                <div class="pin-input">
                    <input type="number" id="regPin1" min="0" max="9" placeholder="0" maxlength="1" required>
                    <input type="number" id="regPin2" min="0" max="9" placeholder="0" maxlength="1" required>
                    <input type="number" id="regPin3" min="0" max="9" placeholder="0" maxlength="1" required>
                    <input type="number" id="regPin4" min="0" max="9" placeholder="0" maxlength="1" required>
                </div>
            </div>

            <div class="form-group active">
                <label>¿Qué curso estás?</label>
                <div class="grade-options">
                    <div class="grade-option">
                        <input type="radio" id="grade1" name="grado" value="principiante" required>
                        <label for="grade1">📚 Principiante (3º - 4º Primaria)</label>
                    </div>
                    <div class="grade-option">
                        <input type="radio" id="grade2" name="grado" value="medio">
                        <label for="grade2">📖 Medio (5º Primaria - Secundaria)</label>
                    </div>
                    <div class="grade-option">
                        <input type="radio" id="grade3" name="grado" value="secundaria">
                        <label for="grade3">📕 Secundaria</label>
                    </div>
                    <div class="grade-option">
                        <input type="radio" id="grade4" name="grado" value="preparatoria">
                        <label for="grade4">📗 Preparatoria</label>
                    </div>
                </div>
            </div>

            <button type="submit" class="submit-btn">Crear mi cuenta</button>
        </form>

        <!-- FORMULARIO DE LOGIN -->
        <form id="loginForm" onsubmit="handleLogin(event)" style="display: none;">
            <div class="form-group active">
                <label for="loginNombre">Tu nombre</label>
                <input type="text" id="loginNombre" placeholder="Ej: Juan..." required>
            </div>

            <div class="form-group active">
                <label for="loginPin">Tu PIN (4 números)</label>
                <div class="pin-input">
                    <input type="number" id="loginPin1" min="0" max="9" placeholder="0" maxlength="1" required>
                    <input type="number" id="loginPin2" min="0" max="9" placeholder="0" maxlength="1" required>
                    <input type="number" id="loginPin3" min="0" max="9" placeholder="0" maxlength="1" required>
                    <input type="number" id="loginPin4" min="0" max="9" placeholder="0" maxlength="1" required>
                </div>
            </div>

            <button type="submit" class="submit-btn">Entrar</button>
        </form>

        <div class="loading" id="loading">
            <div class="spinner"></div>
            <p>Procesando...</p>
        </div>

        <div class="message" id="message"></div>
        <div class="token-display" id="tokenDisplay"></div>
    </div>

    <script src="/static/script_login.js"></script>
</body>
</html>
