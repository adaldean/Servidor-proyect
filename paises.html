<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Geo-Explorador Pro</title>

    <script>
        (function () {
            var theme = localStorage.getItem('theme') || 'light';
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>

    <link rel="stylesheet" href="/static/style_p.css">
    <script src="/static/level-manager.js"></script>
    <script src="/static/script_p.js" defer></script>
</head>

<body>
<div class="app">

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <h3>Información</h3>

        <div class="item">
            <div class="label" id="fav-header" style="cursor:pointer;">Favoritos ▾</div>
            <div id="favorites-list" class="favorites-list">
                <div class="empty">No hay favoritos</div>
            </div>
            <button id="open-favs-page" class="open-favs-btn" style="display:none">
                Ver países favoritos
            </button>
        </div>

        <div class="item">
            <div class="label">Continente</div>
            <div id="continent">—</div>
        </div>

        <div class="item">
            <div class="label">Población</div>
            <div id="population">—</div>
        </div>

        <div class="item">
            <div class="label">Idiomas</div>
            <div id="languages">—</div>
        </div>

        <div class="item" style="margin-top: auto; padding-top: 20px;">
            <button onclick="handleLogout()" 
                class="change-level-btn"
                style="width: 100%; background: #f44336; color: white; border-radius: 8px;">
                🚪 Cerrar Sesión
            </button>
        </div>
    </aside>

    <!-- MAIN -->
    <main class="card">
        <div class="title-row">
            <h2>Explorador del Mundo</h2>
            <button id="theme-toggle" class="theme-toggle">Tema</button>
        </div>

        <p id="loader">Cargando base de datos...</p>

        <div style="display:flex;gap:8px;align-items:center;">
            <select id="country-select" style="display:none;flex:1"></select>
            <button id="fav-btn" class="fav-btn" disabled>☆ Favorito</button>
        </div>

        <div id="info-panel" class="result-grid">
            <div class="flag-box">
                <img id="flag" src="" alt="Bandera">
            </div>

            <h1 id="name" class="country-name"></h1>
            <div id="currency" class="badge"></div>

            <div class="map-container">
                <iframe id="map-frame" src="" title="Mapa"></iframe>
            </div>
        </div>

        <!-- INFO AVANZADA -->
        <div id="extended-info" style="display:none; margin-top:30px;">
            <h3>Información Adicional</h3>

            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(250px,1fr));gap:15px;">

                <div id="subregion-card" style="display:none;">
                    <h4>📍 Subregión</h4>
                    <p id="subregion">—</p>
                </div>

                <div id="area-card" style="display:none;">
                    <h4>📏 Área</h4>
                    <p id="area">—</p>
                </div>

                <div id="currencies-card" style="display:none;">
                    <h4>💰 Monedas</h4>
                    <p id="currencies-full">—</p>
                </div>

                <div id="timezone-card" style="display:none;">
                    <h4>🕐 Zona Horaria</h4>
                    <p id="timezone">—</p>
                </div>

                <div id="density-card" style="display:none;">
                    <h4>👥 Densidad</h4>
                    <p id="density">—</p>
                </div>

                <div id="development-card" style="display:none;">
                    <h4>📈 Desarrollo</h4>
                    <p id="development">—</p>
                </div>

            </div>
        </div>

        <!-- ATRACCIONES -->
        <div id="attractions-section" style="display:none; margin-top:30px;">
            <h3>🏛️ Lugares turísticos</h3>
            <div id="attractions-container"></div>
        </div>
    </main>
</div>

<!-- SCRIPT -->
<script>
function changeEducationLevel() {
    window.location.href = '/'; // puedes cambiar a selector después
}

function handleLogout() {
    localStorage.clear();
    window.location.href = '/'; // ✅ FIX correcto
}

function updateUIByLevel() {
    const level = localStorage.getItem('educationLevel') || 'primaria';

    const texts = {
        primaria: '🎒 Primaria',
        secundaria: '📚 Secundaria',
        universidad: '🎓 Universidad'
    };

    const badge = document.getElementById('level-badge');
    badge.className = 'level-indicator ' + level;

    badge.innerHTML = `
        <span>${texts[level]}</span>
        <button class="change-level-btn" onclick="changeEducationLevel()">Cambiar</button>
    `;

    // 🔥 mostrar info según nivel
    if (level === 'secundaria' || level === 'universidad') {
        document.getElementById('extended-info').style.display = 'block';
    }

    if (level === 'universidad') {
        document.getElementById('attractions-section').style.display = 'block';
    }
}

document.addEventListener('DOMContentLoaded', () => {

    const token = localStorage.getItem('token');

    // ✅ FIX redirección correcta
    if (!token) {
        window.location.href = '/';
        return;
    }

    // 🔥 MAPEO DE NIVELES
    const user = JSON.parse(localStorage.getItem('user') || '{}');

    const map = {
        "principiante": "primaria",
        "medio": "primaria",
        "secundaria": "secundaria"
    };

    if (user.grado) {
        const level = map[user.grado] || "primaria";
        localStorage.setItem('educationLevel', level);
    }

    updateUIByLevel();
});
</script>

</body>
</html>
